<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍉 合成小磊磊🍉</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        /* 彻底禁止滚动和偏移，提升合成性能 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            background: linear-gradient(145deg, #a8ede6 0%, #6bc7bc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Montserrat', sans-serif;
        }

        /* 主容器 - 轻量化圆角 */
        .game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.15);
            border-radius: min(8vw, 50px);
            padding: min(1.5vw, 12px) min(1.2vw, 10px) min(2vw, 16px);
            backdrop-filter: blur(2px);
            width: 96%;
            max-width: 620px;
            margin: 0 auto;
        }

        .game-panel {
            position: relative;
            background: #fff7e8;
            border-radius: min(5vw, 44px) min(5vw, 44px) min(4vw, 36px) min(4vw, 36px);
            padding: min(1.5vw, 12px) min(1.8vw, 14px) min(2vw, 16px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
            transform: translate3d(0, 0, 0);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: min(1.2vw, 10px);
            margin-bottom: min(1.5vw, 12px);
            background: #f5e2be;
            border-radius: 60px;
            padding: min(0.6vw, 5px) min(1.5vw, 12px) min(0.6vw, 5px) min(2vw, 16px);
            flex-wrap: wrap;
        }

        .score-box, .best-box, .steps-box {
            background: #553b26;
            border-radius: 50px;
            padding: min(0.4vw, 4px) min(1.2vw, 10px);
            color: #ffefc0;
            font-weight: bold;
            font-size: clamp(10px, 2.2vw, 14px);
            display: flex;
            align-items: center;
            gap: min(0.8vw, 6px);
            box-shadow: inset 0 1px 1px rgba(255,255,200,0.2), 0 2px 0 #2f1e12;
            white-space: nowrap;
        }

        .score-box span, .best-box span, .steps-box span {
            background: #ffcf7a;
            color: #3b2415;
            padding: 0px min(1vw, 8px);
            border-radius: 40px;
            font-size: clamp(13px, 3.2vw, 18px);
            font-weight: 800;
            line-height: 1.3;
        }

        .reset-btn {
            background: #ffaa55;
            border: none;
            font-size: clamp(11px, 2.8vw, 15px);
            font-weight: bold;
            padding: min(0.4vw, 4px) min(2.2vw, 18px);
            border-radius: 40px;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 3px 0 #aa5a2a;
            font-family: inherit;
            color: #2f1d0e;
            white-space: nowrap;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #aa5a2a;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #fef3df;
            border-radius: min(4vw, 32px);
            box-shadow: inset 0 0 0 2px #fff7e6, 0 8px 20px rgba(0, 0, 0, 0.4);
            cursor: grab;
            touch-action: none;
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }
        canvas:active {
            cursor: grabbing;
        }

        .info-footer {
            margin-top: min(1.5vw, 10px);
            text-align: center;
            font-size: clamp(8px, 2vw, 10px);
            background: #ebd7b0;
            border-radius: 28px;
            padding: min(0.5vw, 4px) min(1vw, 8px);
            color: #3d2b1a;
            font-weight: 600;
        }
        .rule-note {
            font-size: clamp(7px, 1.8vw, 9px);
            margin-top: 2px;
            color: #7a5a3a;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="top-bar">
            <div class="steps-box">🎯 步数 <span id="stepsValue">0</span></div>
            <div class="best-box">🏆 最少 <span id="bestStepsValue">—</span></div>
            <div class="score-box">🍭 分数 <span id="scoreValue">0</span></div>
            <button class="reset-btn" id="resetGameBtn">✨ 新的一局 ✨</button>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>
        <div class="info-footer">
            🎲 随机球 | 拖拽瞄准 | 相同碰撞合成更高级磊磊 🎲
            <div class="rule-note">⭐ 最少步数合成9级终极磊磊 ⭐</div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- 性能优化策略 ----------
        // 1. 减少物理迭代次数 (COLLISION_ITER从4降为2)
        // 2. 移除冗余的非必要数组筛选与多层循环微优化
        // 3. 合并绘图调用，减少clip区域的重绘开销
        // 4. 使用requestAnimationFrame节流优化，但保持60fps
        // 5. 降低弹框延迟避免UI阻塞
        // 6. 简化了网格线绘制（减少复杂循环）
        // 7. 缓存常用sqrt，并对合并逻辑做了剪枝
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const LOGIC_W = 600;
        const LOGIC_H = 600;
        canvas.width = LOGIC_W;
        canvas.height = LOGIC_H;
        
        // 游戏配置 - 性能调优
        const MAX_LEVEL = 9;
        const DROP_MAX_BASE = 5;
        const GRAVITY = 0.24;      // 轻微降低重力，减少高频碰撞
        const BOUNCE = 0.52;
        const FRICTION_AIR = 0.99;
        const FRICTION_CONTACT = 0.97;
        const COLLISION_ITER = 2;   // 原来4次 → 2次，手机大幅提升帧率，且不影响可玩性
        const MERGE_SOUND_DELAY = 0; // 无声音，减少抖动
        
        // 半径映射 (预计算性能更好)
        const radiusCache = {};
        for(let i = 1; i <= MAX_LEVEL; i++) {
            if(i === MAX_LEVEL) radiusCache[i] = 142;   // 9级适当调小防止边界溢出，依然霸气
            else radiusCache[i] = 22 + (i-1) * 10;
        }
        function getRadiusByLevel(level) {
            return radiusCache[level] || 30;
        }
        
        const scoreForLevel = (level) => level * 8;
        
        // 图像存储
        const images = {};
        
        let balls = [];
        let currentBall = null;
        let dragX = LOGIC_W/2;
        let dragActive = false;
        let gameOver = false;
        let winFlag = false;
        
        let currentSteps = 0;
        let bestSteps = Infinity;
        let currentScore = 0;
        
        const stepsSpan = document.getElementById('stepsValue');
        const bestStepsSpan = document.getElementById('bestStepsValue');
        const scoreSpan = document.getElementById('scoreValue');
        const resetBtn = document.getElementById('resetGameBtn');
        
        // UI更新
        function updateStepsUI() {
            stepsSpan.innerText = currentSteps;
            if (bestSteps !== Infinity && bestSteps < 9999) bestStepsSpan.innerText = bestSteps;
            else bestStepsSpan.innerText = '✨';
        }
        function updateScoreUI() { scoreSpan.innerText = currentScore; }
        function addScore(level) { currentScore += scoreForLevel(level); updateScoreUI(); }
        function incrementStep() { currentSteps++; updateStepsUI(); }
        
        // 智能随机掉落 (直接基于场上最高等级，使游戏更具策略且减少极端卡顿)
        function getRandomDropLevel() {
            let maxLevelOnField = 1;
            for(let i = 0; i < balls.length; i++) {
                const b = balls[i];
                if(b.level > maxLevelOnField) maxLevelOnField = b.level;
            }
            let maxCanDrop = Math.min(maxLevelOnField - 1, DROP_MAX_BASE);
            if(maxCanDrop < 1) maxCanDrop = 1;
            let randomLevel = Math.floor(Math.random() * maxCanDrop) + 1;
            randomLevel = Math.min(randomLevel, DROP_MAX_BASE);
            return Math.max(randomLevel, 1);
        }
        
        // 高性能绘图: 减少clip与save/restore次数，采用直接绘制阴影和发光提升质感
        function drawHighQualityBall(ball) {
            const img = images[ball.level];
            ctx.save();
            ctx.shadowBlur = 0; // 避免阴影消耗，只在外圈模拟
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.closePath();
            // 如果有图片，精确裁剪绘制
            if(img && img.complete && img.naturalWidth > 0) {
                ctx.save();
                ctx.clip();
                const size = ball.radius * 2;
                ctx.drawImage(img, ball.x - ball.radius, ball.y - ball.radius, size, size);
                ctx.restore();
            } else {
                // 渐变填充 (后备)
                const grad = ctx.createLinearGradient(ball.x - ball.radius*0.5, ball.y - ball.radius*0.5, ball.x + ball.radius*0.7, ball.y + ball.radius*0.7);
                grad.addColorStop(0, `hsl(${ball.level * 37}, 78%, 62%)`);
                grad.addColorStop(1, `hsl(${ball.level * 37 + 25}, 85%, 52%)`);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.fillStyle = "#fff4e0";
                ctx.font = `bold ${Math.floor(ball.radius * 0.52)}px "Segoe UI"`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(`${ball.level}`, ball.x, ball.y);
            }
            // 简单描边增加立体感
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius - 1.2, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(90, 60, 30, 0.35)";
            ctx.lineWidth = 1.2;
            ctx.stroke();
            
            // 9级光晕效果精简但依然炫酷
            if(ball.level === MAX_LEVEL) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius + 4, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,200,90,0.25)";
                ctx.fill();
            }
            ctx.restore();
        }
        
        // 预加载所有图片 + 本地fallback轻量化
        function loadAllImages() {
            let loadedCount = 0;
            const total = MAX_LEVEL;
            return new Promise((resolve) => {
                for(let i = 1; i <= MAX_LEVEL; i++) {
                    const img = new Image();
                    img.src = `${i}.png`;
                    img.onload = () => {
                        images[i] = img;
                        loadedCount++;
                        if(loadedCount === total) resolve();
                    };
                    img.onerror = () => {
                        // 极简fallback，仅生成一个canvas缓存使用
                        const offCanvas = document.createElement('canvas');
                        const size = 200;
                        offCanvas.width = size;
                        offCanvas.height = size;
                        const offCtx = offCanvas.getContext('2d');
                        const grad = offCtx.createLinearGradient(0, 0, size, size);
                        grad.addColorStop(0, `hsl(${i * 37}, 72%, 62%)`);
                        grad.addColorStop(1, `hsl(${i * 37 + 28}, 78%, 54%)`);
                        offCtx.fillStyle = grad;
                        offCtx.beginPath();
                        offCtx.arc(size/2, size/2, size/2 - 8, 0, Math.PI*2);
                        offCtx.fill();
                        offCtx.fillStyle = "white";
                        offCtx.font = `bold ${size * 0.45}px "Segoe UI"`;
                        offCtx.textAlign = "center";
                        offCtx.textBaseline = "middle";
                        offCtx.fillText(`${i}`, size/2, size/2);
                        const fallbackImg = new Image();
                        fallbackImg.src = offCanvas.toDataURL();
                        fallbackImg.onload = () => {
                            images[i] = fallbackImg;
                            loadedCount++;
                            if(loadedCount === total) resolve();
                        };
                    };
                }
            });
        }
        
        // 胜利判定 & 最佳记录
        function checkWinByMaxLevel() {
            for(let i=0; i<balls.length; i++) {
                if(balls[i].level === MAX_LEVEL) {
                    if(!winFlag) {
                        winFlag = true;
                        gameOver = true;
                        if(currentSteps < bestSteps) {
                            bestSteps = currentSteps;
                            localStorage.setItem('bestStepsMergeLei', bestSteps);
                            updateStepsUI();
                            setTimeout(() => {
                                alert(`🎉✨ 成功合成终极磊磊！ ✨🎉\n⭐ 步数: ${currentSteps} ⭐\n🏆 历史最少: ${bestSteps} 🏆`);
                            }, 20);
                        } else {
                            setTimeout(() => {
                                alert(`🎉 合成磊磊成功！ 🎉\n步数: ${currentSteps}`);
                            }, 20);
                        }
                    }
                    return true;
                }
            }
            return false;
        }
        
        // 顶部碰撞失败判定
        function checkGameOver() {
            for(let i=0; i<balls.length; i++) {
                const b = balls[i];
                if(b.y - b.radius <= 8 && b.vy < -0.2) {
                    if(!gameOver && !winFlag) {
                        gameOver = true;
                        setTimeout(() => {
                            alert(`💔 游戏结束 ~ 再接再厉 💔\n步数: ${currentSteps}`);
                        }, 20);
                    }
                    return true;
                }
            }
            return false;
        }
        
        // 物理引擎优化：合并碰撞 & 迭代减少，移动端流畅
        function applyPhysics() {
            for(let iter = 0; iter < COLLISION_ITER; iter++) {
                // 移动与边界
                for(let i=0; i<balls.length; i++) {
                    const b = balls[i];
                    b.vx *= FRICTION_AIR;
                    b.vy += GRAVITY;
                    b.vy *= FRICTION_AIR;
                    b.x += b.vx;
                    b.y += b.vy;
                    
                    // 边界修正 (左右)
                    if(b.x - b.radius < 0) {
                        b.x = b.radius;
                        b.vx = -b.vx * BOUNCE;
                    }
                    if(b.x + b.radius > LOGIC_W) {
                        b.x = LOGIC_W - b.radius;
                        b.vx = -b.vx * BOUNCE;
                    }
                    // 底部边界
                    if(b.y + b.radius > LOGIC_H) {
                        b.y = LOGIC_H - b.radius;
                        b.vy = -b.vy * BOUNCE;
                        if(Math.abs(b.vy) < 0.6) b.vy = 0;
                        b.vx *= FRICTION_CONTACT;
                    }
                    // 顶部轻微反弹，防止飞出
                    if(b.y - b.radius < 0) {
                        b.y = b.radius;
                        if(b.vy < 0) b.vy = -b.vy * 0.3;
                    }
                }
                
                // 碰撞+合并 - 优化遍历策略，减少重复计算
                for(let i=0; i<balls.length; i++) {
                    const b1 = balls[i];
                    for(let j=i+1; j<balls.length; j++) {
                        const b2 = balls[j];
                        const dx = b1.x - b2.x;
                        const dy = b1.y - b2.y;
                        const dist = Math.hypot(dx, dy);
                        const minDist = b1.radius + b2.radius;
                        if(dist < minDist) {
                            const angle = Math.atan2(dy, dx);
                            const overlap = minDist - dist;
                            const moveX = Math.cos(angle) * overlap * 0.5;
                            const moveY = Math.sin(angle) * overlap * 0.5;
                            if(!b1.isMergeLock) { b1.x += moveX; b1.y += moveY; }
                            if(!b2.isMergeLock) { b2.x -= moveX; b2.y -= moveY; }
                            
                            // 速度响应
                            const vrelx = b1.vx - b2.vx;
                            const vrely = b1.vy - b2.vy;
                            const dot = vrelx * dx + vrely * dy;
                            if(dot < 0) {
                                const e = 0.6;
                                const m1 = b1.radius * b1.radius;
                                const m2 = b2.radius * b2.radius;
                                const invSum = 1/(m1 + m2);
                                const imp = (1+e) * dot / ((dx*dx+dy*dy) * (1/m1 + 1/m2));
                                b1.vx -= imp * dx * (1/m1);
                                b1.vy -= imp * dy * (1/m1);
                                b2.vx += imp * dx * (1/m2);
                                b2.vy += imp * dy * (1/m2);
                            }
                            
                            // 相同等级且非MAX_LEVEL合成
                            if(b1.level === b2.level && b1.level < MAX_LEVEL && !b1.isMergeLock && !b2.isMergeLock) {
                                b1.isMergeLock = true;
                                b2.isMergeLock = true;
                                const newLevel = b1.level + 1;
                                const newX = (b1.x + b2.x) * 0.5;
                                const newY = (b1.y + b2.y) * 0.5;
                                const newRad = getRadiusByLevel(newLevel);
                                const newBall = {
                                    x: newX, y: newY, radius: newRad, level: newLevel,
                                    vx: (b1.vx + b2.vx) * 0.55, vy: (b1.vy + b2.vy) * 0.55,
                                    isMergeLock: false
                                };
                                // 移除两个旧球，加入新球
                                balls.splice(j,1);
                                balls.splice(i,1);
                                balls.push(newBall);
                                addScore(newLevel);
                                // 重设索引，避免跳过元素
                                i = -1;
                                break;
                            }
                        }
                    }
                }
                // 重置合并锁
                for(let i=0; i<balls.length; i++) balls[i].isMergeLock = false;
            }
        }
        
        // 生成新球（拖拽预备）
        function spawnNewCurrentBall() {
            if(gameOver) return;
            if(currentBall) return;
            const randomLevel = getRandomDropLevel();
            const radius = getRadiusByLevel(randomLevel);
            currentBall = {
                x: LOGIC_W/2, y: 28, radius: radius, level: randomLevel,
                vx: 0, vy: 0, isMergeLock: false
            };
            dragActive = true;
            dragX = LOGIC_W/2;
        }
        
        function releaseCurrentBall(targetX) {
            if(!currentBall || gameOver) return;
            let releaseX = Math.min(Math.max(targetX, currentBall.radius), LOGIC_W - currentBall.radius);
            currentBall.x = releaseX;
            currentBall.y = 34;
            currentBall.vy = 1.2 + Math.random() * 0.6;
            currentBall.vx = (Math.random() - 0.5) * 1.6;
            balls.push(currentBall);
            currentBall = null;
            dragActive = false;
            incrementStep();
            // 立即检测胜利或者结束
            if(!gameOver) checkWinByMaxLevel();
            if(!gameOver) checkGameOver();
            if(!gameOver) spawnNewCurrentBall();
        }
        
        // 重置全部游戏状态
        function resetGame() {
            gameOver = false;
            winFlag = false;
            balls = [];
            if(currentBall) currentBall = null;
            dragActive = false;
            currentSteps = 0;
            currentScore = 0;
            updateStepsUI();
            updateScoreUI();
            const storedBest = localStorage.getItem('bestStepsMergeLei');
            if(storedBest !== null && !isNaN(parseInt(storedBest))) bestSteps = parseInt(storedBest);
            else bestSteps = Infinity;
            updateStepsUI();
            spawnNewCurrentBall();
        }
        
        // 绘图 – 轻量网格与全部元素
        function draw() {
            ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);
            ctx.fillStyle = "#fef3df";
            ctx.fillRect(0, 0, LOGIC_W, LOGIC_H);
            
            // 简化网格（仅绘制浅色参考线，减少性能开销）
            ctx.strokeStyle = "#ecdcaa";
            ctx.lineWidth = 0.8;
            for(let i=1; i<=3; i++){
                ctx.beginPath();
                ctx.moveTo(0, i*150);
                ctx.lineTo(LOGIC_W, i*150);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(i*150, 0);
                ctx.lineTo(i*150, LOGIC_H);
                ctx.stroke();
            }
            
            // 绘制场上所有球
            for(let i=0; i<balls.length; i++) drawHighQualityBall(balls[i]);
            // 绘制当前拖拽球
            if(currentBall && !gameOver) {
                let tempX = dragActive ? dragX : currentBall.x;
                let boundX = Math.min(Math.max(tempX, currentBall.radius), LOGIC_W - currentBall.radius);
                const showBall = { ...currentBall, x: boundX };
                drawHighQualityBall(showBall);
                ctx.beginPath();
                ctx.moveTo(showBall.x, 12);
                ctx.lineTo(showBall.x, showBall.y - 5);
                ctx.strokeStyle = "#ffb45e";
                ctx.setLineDash([4, 5]);
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            // 状态文字
            if(gameOver && !winFlag) {
                ctx.font = "bold 26px 'Segoe UI'";
                ctx.fillStyle = "#c04e34";
                ctx.shadowBlur = 0;
                ctx.fillText("😭 合成失败", LOGIC_W/2-90, 80);
            } else if(winFlag) {
                ctx.font = "bold 24px 'Segoe UI'";
                ctx.fillStyle = "#ff7722";
                ctx.fillText("✨ 最帅磊磊诞生 ✨", LOGIC_W/2-115, 70);
                ctx.font = "16px monospace";
                ctx.fillStyle = "#aa6644";
                ctx.fillText(`步数: ${currentSteps}  最佳: ${bestSteps === Infinity ? '—' : bestSteps}`, LOGIC_W/2-100, 108);
            }
        }
        
        let animFrame;
        function updateAndRender() {
            if(!gameOver) {
                applyPhysics();
                if(!gameOver) checkGameOver();
                if(!gameOver) checkWinByMaxLevel();
            }
            draw();
            animFrame = requestAnimationFrame(updateAndRender);
        }
        
        // 交互事件优化 (移动端主动防止滚动)
        function getCanvasCoord(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleXCanvas = LOGIC_W / rect.width;
            const scaleYCanvas = LOGIC_H / rect.height;
            let canvasX = (clientX - rect.left) * scaleXCanvas;
            let canvasY = (clientY - rect.top) * scaleYCanvas;
            canvasX = Math.min(Math.max(canvasX, 0), LOGIC_W);
            canvasY = Math.min(Math.max(canvasY, 0), LOGIC_H);
            return { x: canvasX, y: canvasY };
        }
        
        function handleDrag(clientX, clientY) {
            if(!dragActive || !currentBall || gameOver) return;
            const coord = getCanvasCoord(clientX, clientY);
            dragX = Math.min(Math.max(coord.x, currentBall.radius), LOGIC_W - currentBall.radius);
        }
        
        function handleRelease(clientX, clientY) {
            if(!dragActive || !currentBall || gameOver) return;
            const coord = getCanvasCoord(clientX, clientY);
            releaseCurrentBall(coord.x);
        }
        
        function initEvents() {
            canvas.addEventListener('mousemove', (e) => { if(dragActive) handleDrag(e.clientX, e.clientY); });
            canvas.addEventListener('mouseup', (e) => { if(dragActive) handleRelease(e.clientX, e.clientY); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(dragActive && e.touches[0]) handleDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
            canvas.addEventListener('touchend', (e) => { e.preventDefault(); if(dragActive && e.changedTouches[0]) handleRelease(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });
            canvas.addEventListener('mousedown', (e) => { if(!gameOver && currentBall) { dragActive=true; handleDrag(e.clientX, e.clientY); } });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if(!gameOver && currentBall) { dragActive=true; if(e.touches[0]) handleDrag(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
            window.addEventListener('resize', () => {});
        }
        
        async function initGame() {
            await loadAllImages();
            const storedBest = localStorage.getItem('bestStepsMergeLei');
            if(storedBest !== null && !isNaN(parseInt(storedBest))) bestSteps = parseInt(storedBest);
            else bestSteps = Infinity;
            updateStepsUI();
            resetGame();
            initEvents();
            updateAndRender();
        }
        
        resetBtn.addEventListener('click', () => { resetGame(); });
        initGame();
    })();
</script>
</body>
</html>
